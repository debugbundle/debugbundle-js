name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Stable SDK version to publish (for example 0.1.0)
        required: true
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org

      - name: Enable Corepack
        run: |
          corepack enable
          corepack prepare pnpm@10.32.1 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
          else
            version="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$version" ]]; then
            echo "missing_version" >&2
            exit 1
          fi

          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Check published SDK state
        id: published_state
        run: |
          node --input-type=module <<'EOF'
          const releaseVersion = process.env.RELEASE_VERSION;
          const githubOutput = process.env.GITHUB_OUTPUT;

          if (!releaseVersion) {
            throw new Error("missing_release_version");
          }

          if (!githubOutput) {
            throw new Error("missing_github_output");
          }

          const packages = ["@debugbundle/sdk-node", "@debugbundle/sdk-browser"];
          const published = [];

          for (const packageName of packages) {
            const response = await fetch(`https://registry.npmjs.org/${encodeURIComponent(packageName)}/${releaseVersion}`);

            if (response.status === 404) {
              continue;
            }

            if (!response.ok) {
              throw new Error(`failed_to_check_${packageName.replaceAll("/", "_")}_${response.status}`);
            }

            published.push(packageName);
          }

          const state =
            published.length === 0 ? "none" :
            published.length === packages.length ? "all" :
            "partial";

          const { appendFileSync } = await import("node:fs");
          appendFileSync(githubOutput, `state=${state}\n`);
          appendFileSync(githubOutput, `published=${published.join(",")}\n`);
          EOF
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Abort on partially published SDK release
        if: steps.published_state.outputs.state == 'partial'
        run: |
          echo "Release version ${{ steps.release_version.outputs.value }} is only partially published: ${{ steps.published_state.outputs.published }}" >&2
          echo "Bump both SDK package versions to a fresh stable version before retrying." >&2
          exit 1

      - name: Note already published SDK release
        if: steps.published_state.outputs.state == 'all'
        run: echo "Release version ${{ steps.release_version.outputs.value }} is already published for both JS SDK packages; skipping publish steps."

      - name: Validate package versions
        run: |
          node --input-type=module <<'EOF'
          import { readFileSync } from "node:fs";

          const expectedVersion = process.env.RELEASE_VERSION;
          if (!expectedVersion) {
            throw new Error("missing_release_version");
          }

          if (expectedVersion.includes("-")) {
            throw new Error(`unexpected_prerelease_version:${expectedVersion}`);
          }

          const packageFiles = [
            "packages/sdk-node/package.json",
            "packages/sdk-browser/package.json"
          ];

          for (const packageFile of packageFiles) {
            const packageJson = JSON.parse(readFileSync(packageFile, "utf8"));
            if (packageJson.version !== expectedVersion) {
              throw new Error(`${packageJson.name} version ${packageJson.version} does not match release ${expectedVersion}`);
            }
          }
          EOF
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Verify stable shared-package availability
        run: |
          for package_name in @debugbundle/shared-types @debugbundle/redaction; do
            npm view "${package_name}@${RELEASE_VERSION}" version >/dev/null
          done
        env:
          RELEASE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Run lint, typecheck, tests, and build
        run: |
          pnpm lint
          pnpm typecheck
          pnpm test
          pnpm build

      - name: Smoke test packed SDK artifacts
        run: pnpm smoke:packed

      - name: Publish SDK packages
        if: steps.published_state.outputs.state == 'none'
        run: |
          npm publish ./.tmp/npm-release/sdk-node --tag latest --access public
          npm publish ./.tmp/npm-release/sdk-browser --tag latest --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Smoke test published SDK packages
        run: pnpm smoke:registry
        env:
          DEBUGBUNDLE_SMOKE_VERSION: ${{ steps.release_version.outputs.value }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_version.outputs.value }}
          files: |
            .tmp/npm-packages/debugbundle-sdk-node-${{ steps.release_version.outputs.value }}.tgz
            .tmp/npm-packages/debugbundle-sdk-browser-${{ steps.release_version.outputs.value }}.tgz
          generate_release_notes: true
