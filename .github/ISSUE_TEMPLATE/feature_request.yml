name: Feature Request
description: Propose an improvement for the DebugBundle JavaScript SDK repository.
title: "feature: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem first, then the proposed solution.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer or product problem are you trying to solve?
      placeholder: A clear and concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you considered.
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, examples, or API sketches here.